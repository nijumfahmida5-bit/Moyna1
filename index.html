<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Message</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ece5dd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat{
background:white;
width:90%;
max-width:400px;
border-radius:15px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.bubble{
background:#dcf8c6;
padding:10px 12px;
border-radius:10px;
margin-bottom:10px;
max-width:80%;
opacity:0;
}

button{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:20px;
background:#25d366;
color:white;
font-size:16px;
cursor:pointer;
display:none;
}

</style>
</head>

<body>

<div class="chat">

<div id="m1" class="bubble">Hey Moyna ❤️</div>
<div id="m2" class="bubble">I made something special for you.</div>
<div id="m3" class="bubble">Open it when you're alone 🌸</div>

<button id="openBtn" onclick="go()">Open</button>

</div>

<script>

let msgs=["m1","m2","m3"]
let i=0

function showMsg(){

if(i<msgs.length){

document.getElementById(msgs[i]).style.opacity=1

i++

setTimeout(showMsg,1200)

}else{

document.getElementById("openBtn").style.display="inline-block"

}

}

showMsg()

function go(){
window.location.href="love.html"
}

</script>

</body>
</html>
